<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Heliganeh's Secret Sky 🌌</title>
  <!-- Vazirmatn font for Persian text & elegant Latin -->
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0a0a1a;
      --bg-card: rgba(20, 18, 50, 0.65);
      --text-primary: #e6e0f0;
      --text-soft: #c0b0d8;
      --accent: #d9a6ff;
      --accent2: #ffb3d9;
      --gold: #fae37c;
      --gold-glow: #f5d742;
      --error: #ff8a8a;
      --font: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
      --border-glow: rgba(217, 166, 255, 0.4);
      --transition-smooth: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
    }

    body {
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Background canvas for living sky */
    #skyCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Overlay containers – all positioned above canvas */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      background: rgba(8, 8, 20, 0.5);
      transition: opacity 0.6s ease, visibility 0.6s;
    }
    .overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ===== LANDING PAGE ===== */
    .landing-card {
      text-align: center;
      padding: 2rem 1.8rem;
      background: var(--bg-card);
      border-radius: 2.5rem;
      border: 1px solid var(--border-glow);
      box-shadow: 0 0 60px rgba(180, 130, 255, 0.15);
      backdrop-filter: blur(20px);
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .landing-card h1 {
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: 1px;
      color: #f0e5ff;
      margin-bottom: 0.4rem;
    }
    .landing-card .sub {
      font-size: 0.95rem;
      color: var(--text-soft);
      margin-bottom: 2rem;
      letter-spacing: 1px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #b982f0, #d89cff);
      border: none;
      color: #1a0a2e;
      font-weight: 600;
      padding: 0.9rem 2.8rem;
      border-radius: 3rem;
      font-size: 1.1rem;
      letter-spacing: 0.8px;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(180, 120, 240, 0.4);
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(200, 140, 255, 0.6);
    }

    /* ===== LOGIN MODAL ===== */
    .login-box {
      background: var(--bg-card);
      backdrop-filter: blur(30px);
      border-radius: 2.2rem;
      padding: 2.5rem 2rem;
      border: 1px solid var(--border-glow);
      text-align: center;
      max-width: 380px;
      width: 85%;
      animation: fadeUp 0.6s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-box h2 {
      font-weight: 400;
      margin-bottom: 0.5rem;
      color: #e9dbff;
    }
    .login-box input {
      width: 100%;
      padding: 1rem;
      border-radius: 3rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(217,166,255,0.5);
      color: #f0e5ff;
      font-size: 1rem;
      text-align: center;
      letter-spacing: 2px;
      margin: 1.8rem 0 1.2rem;
      outline: none;
      font-family: var(--font);
      transition: 0.3s;
    }
    .login-box input:focus {
      border-color: #e2b0ff;
      box-shadow: 0 0 25px rgba(200,150,255,0.3);
    }
    .login-error {
      color: var(--error);
      font-size: 0.9rem;
      min-height: 1.5rem;
      margin-top: 0.3rem;
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0);}
      25%{transform:translateX(-5px);}
      75%{transform:translateX(5px);}
    }

    /* ===== MUSIC PROMPT ===== */
    .music-prompt {
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 2rem;
      text-align: center;
      backdrop-filter: blur(20px);
    }
    .music-prompt p {
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
    }
    .music-prompt .btn-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.7rem 2rem;
      border-radius: 3rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-ghost:hover {
      background: rgba(217,166,255,0.15);
    }

    /* ===== MAIN SKY (YEGANEH VIEW) ===== */
    #yeganehView {
      position: relative;
      z-index: 5;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1rem 2rem;
      opacity: 0;
      transition: opacity 0.7s;
      pointer-events: none;
    }
    #yeganehView.active {
      opacity: 1;
      pointer-events: auto;
    }
    .sky-header {
      margin-top: 2.5rem;
      text-align: center;
      z-index: 2;
    }
    .discovered-counter {
      background: rgba(30,20,60,0.7);
      padding: 0.4rem 1.5rem;
      border-radius: 3rem;
      font-size: 0.9rem;
      color: var(--gold);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(250,227,124,0.3);
      display: inline-block;
      margin-top: 0.8rem;
    }
    .stars-field {
      flex: 1;
      width: 100%;
      position: relative;
      margin-top: 2rem;
    }
    .star {
      position: absolute;
      width: 48px;
      height: 48px;
      cursor: pointer;
      transition: transform 0.3s ease;
      z-index: 1;
    }
    .star:hover {
      transform: scale(1.2);
    }
    .star:active {
      transform: scale(0.9);
    }
    .star svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 6px rgba(200,180,255,0.5));
      transition: filter 0.5s;
    }
    .star.opened svg {
      filter: drop-shadow(0 0 20px #fae37c) drop-shadow(0 0 40px #f5d742);
      animation: pulseGlow 2.5s infinite;
    }
    @keyframes pulseGlow {
      0%,100% { filter: drop-shadow(0 0 18px #fae37c) drop-shadow(0 0 35px #f5d742); }
      50% { filter: drop-shadow(0 0 28px #ffeaa7) drop-shadow(0 0 55px #f5d742); }
    }
    .star-number {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.7rem;
      font-weight: bold;
      color: #3a2a4a;
      pointer-events: none;
    }
    .sparkle {
      position: absolute;
      width: 5px;
      height: 5px;
      background: #fffbe6;
      border-radius: 50%;
      box-shadow: 0 0 10px #fae37c;
      pointer-events: none;
      animation: sparkleDrift 1.8s infinite;
      opacity: 0;
    }
    @keyframes sparkleDrift {
      0% { opacity: 0; transform: translate(0,0) scale(0.5); }
      30% { opacity: 1; transform: translate(6px,-10px) scale(1.2); }
      100% { opacity: 0; transform: translate(15px,-25px) scale(0.3); }
    }

    /* ===== ADMIN PANEL ===== */
    #adminPanel {
      position: relative;
      z-index: 5;
      width: 100%;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      background: rgba(5,5,20,0.9);
      backdrop-filter: blur(15px);
      display: none;
      flex-direction: column;
      align-items: center;
    }
    #adminPanel.active {
      display: flex;
    }
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      max-width: 900px;
      width: 100%;
      margin-top: 1.5rem;
    }
    .admin-card {
      background: var(--bg-card);
      border-radius: 1.5rem;
      padding: 1.2rem;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .admin-card label {
      font-size: 0.75rem;
      color: #b0a0c8;
    }
    .admin-card input, .admin-card select, .admin-card textarea {
      width: 100%;
      margin: 0.3rem 0 0.8rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid #443366;
      border-radius: 1rem;
      padding: 0.5rem 1rem;
      color: #f0e5ff;
      font-family: var(--font);
    }
    .btn-small {
      background: var(--accent);
      color: #1a0a2e;
      border: none;
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* ===== MODALS ===== */
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.35s;
    }
    .modal.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-card {
      background: rgba(25,20,55,0.9);
      border-radius: 2rem;
      padding: 2rem 1.5rem;
      max-width: 380px;
      width: 90%;
      border: 1px solid var(--border-glow);
      text-align: center;
      animation: fadeUp 0.3s ease;
    }
    .modal-card input {
      width: 100%;
      padding: 0.8rem;
      margin: 1.2rem 0;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--accent);
      border-radius: 2rem;
      color: #f0e5ff;
      text-align: center;
      font-family: var(--font);
    }
    .modal-error {
      color: var(--error);
      min-height: 1.2rem;
      font-size: 0.85rem;
    }

    /* content modal special */
    .content-body {
      margin: 1rem 0;
      max-height: 55vh;
      overflow-y: auto;
    }
    .content-body img {
      max-width: 100%;
      border-radius: 1.2rem;
    }
    .content-body audio, .content-body video {
      width: 100%;
      border-radius: 1.2rem;
    }

    /* final message */
    #finalMessage {
      position: fixed;
      top:0;left:0;width:100%;height:100%;
      background: rgba(0,0,0,0.9);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      visibility: hidden;
    }
    #finalMessage.active {
      visibility: visible;
    }
    .magic-text {
      font-size: 2.2rem;
      color: #ffeaa7;
      text-shadow: 0 0 40px #f5d742;
      animation: magicPulse 2s infinite;
      text-align: center;
      padding: 1rem;
    }
    @keyframes magicPulse {
      0%,100% { text-shadow: 0 0 35px #f5d742; }
      50% { text-shadow: 0 0 70px #ffeaa7; }
    }
  </style>
</head>
<body>
  <canvas id="skyCanvas"></canvas>

  <!-- LANDING PAGE -->
  <div class="overlay" id="landingOverlay">
    <div class="landing-card">
      <h1>✨ Heliganeh ✨</h1>
      <div class="sub">a secret sky awaits you</div>
      <button class="btn-primary" onclick="goToLogin()">Enter the night</button>
    </div>
  </div>

  <!-- LOGIN OVERLAY -->
  <div class="overlay hidden" id="loginOverlay">
    <div class="login-box">
      <h2>🔐 whisper the password</h2>
      <input type="password" id="loginPassword" placeholder="••••••" autocomplete="off">
      <button class="btn-primary" onclick="handleLogin()" style="width:100%">unlock</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- MUSIC PROMPT -->
  <div class="overlay hidden" id="musicPrompt">
    <div class="music-prompt">
      <p>🎵 would you like some soft music?</p>
      <div class="btn-row">
        <button class="btn-primary" onclick="startMusic(true)">yes, please</button>
        <button class="btn-ghost" onclick="startMusic(false)">no, thank you</button>
      </div>
    </div>
  </div>

  <!-- YEGANEH SKY VIEW -->
  <div id="yeganehView">
    <div class="sky-header">
      <div style="font-size:1.4rem; color:#e9dbff;">🌙 the sky of 21 secrets</div>
      <div class="discovered-counter" id="counterDisplay">0 / 21 stars found</div>
    </div>
    <div class="stars-field" id="starsField"></div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <div style="display:flex; justify-content:space-between; width:100%; max-width:900px; align-items:center;">
      <h2 style="color:#e2b0ff;">🛠 Admin · edit secrets</h2>
      <button class="btn-ghost" onclick="logout()">↩ leave</button>
    </div>
    <div class="admin-grid" id="adminGrid"></div>
  </div>

  <!-- STAR CODE MODAL -->
  <div class="modal" id="starCodeModal">
    <div class="modal-card">
      <h3>🔑 enter the star code</h3>
      <input type="password" id="starCodeInput" placeholder="secret code">
      <button class="btn-primary" onclick="submitStarCode()">open</button>
      <button class="btn-ghost" style="margin-top:0.5rem;" onclick="closeStarCodeModal()">cancel</button>
      <div class="modal-error" id="starCodeError"></div>
    </div>
  </div>

  <!-- CONTENT MODAL -->
  <div class="modal" id="contentModal">
    <div class="modal-card">
      <h3 id="contentTitle">🎁</h3>
      <div class="content-body" id="contentBody"></div>
      <button class="btn-ghost" onclick="closeContentModal()">close</button>
    </div>
  </div>

  <!-- FINAL MESSAGE -->
  <div id="finalMessage">
    <div class="magic-text">✨ world is better with you Heliganeh ♡</div>
  </div>

  <audio id="bgMusic" loop preload="none"></audio>

  <script>
    // ──────────────────────────────────────
    // CONFIGURATION
    // ──────────────────────────────────────
    const YEGANEH_PASSWORD = 'Heliganeh';
    const ADMIN_PASSWORD = '221B';
    const TOTAL_STARS = 21;
    const DEFAULT_MUSIC_URL = 'https://cdn.freesound.org/previews/723/723123_5673399-lq.mp3'; // peaceful placeholder, replace with your own

    // Star positions (precomputed natural scatter, saved in localStorage)
    let starPositions = [];

    // ──────────────────────────────────────
    // STATE MANAGEMENT
    // ──────────────────────────────────────
    function loadState() {
      let data = JSON.parse(localStorage.getItem('starData')) || [];
      while(data.length < TOTAL_STARS) data.push({ code: '', type: 'link', content: '' });
      if(data.length > TOTAL_STARS) data = data.slice(0,TOTAL_STARS);
      localStorage.setItem('starData', JSON.stringify(data));

      let opened = JSON.parse(localStorage.getItem('yeganehOpened')) || [];
      opened = opened.filter(i => i>=0 && i<TOTAL_STARS);
      localStorage.setItem('yeganehOpened', JSON.stringify(opened));

      let finalShown = localStorage.getItem('finalMessageShown') === 'true';
      return { starData: data, opened, finalShown };
    }

    function saveOpened(arr) { localStorage.setItem('yeganehOpened', JSON.stringify(arr)); }
    function saveStarData(arr) { localStorage.setItem('starData', JSON.stringify(arr)); }

    // Generate or load star positions (consistent sky)
    function getStarPositions() {
      let pos = JSON.parse(localStorage.getItem('starPositions'));
      if (!pos || pos.length !== TOTAL_STARS) {
        pos = [];
        const used = [];
        for (let i=0; i<TOTAL_STARS; i++) {
          let x, y, attempts=0;
          do {
            x = 15 + Math.random()*70;  // 15%-85% width
            y = 10 + Math.random()*70;  // 10%-80% height (keep away from edges)
            attempts++;
          } while(attempts<50 && used.some(p => Math.hypot(p.x-x, p.y-y) < 12));
          used.push({x,y});
          pos.push({x: Math.round(x), y: Math.round(y)});
        }
        localStorage.setItem('starPositions', JSON.stringify(pos));
      }
      return pos;
    }

    // ──────────────────────────────────────
    // CANVAS BACKGROUND (twinkling stars + shooting)
    // ──────────────────────────────────────
    const canvas = document.getElementById('skyCanvas');
    const ctx = canvas.getContext('2d');
    let bgStars = [], shootingStars = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function initBgStars() {
      bgStars = [];
      let count = Math.floor((canvas.width*canvas.height)/2000);
      for(let i=0;i<count;i++) {
        bgStars.push({
          x: Math.random()*canvas.width,
          y: Math.random()*canvas.height,
          r: Math.random()*1.5+0.3,
          speed: Math.random()*0.02+0.008,
          offset: Math.random()*Math.PI*2,
          alpha: Math.random()*0.5+0.3
        });
      }
    }
    initBgStars();
    window.addEventListener('resize', initBgStars);

    function spawnShootingStar() {
      if(Math.random()<0.004) {
        shootingStars.push({
          x: Math.random()*canvas.width*0.7,
          y: Math.random()*canvas.height*0.5,
          vx: Math.random()*5+3,
          vy: Math.random()*2+1,
          life: 1,
          decay: 0.012+Math.random()*0.01,
          trail: []
        });
      }
    }

    function drawSky() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const t = Date.now()/1000;
      for(const s of bgStars) {
        let a = s.alpha + Math.sin(t*s.speed*50 + s.offset)*0.2;
        ctx.fillStyle = `rgba(220,210,255,${Math.max(0.1, a)})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fill();
      }
      for(let i=shootingStars.length-1;i>=0;i--) {
        let ss = shootingStars[i];
        ss.x += ss.vx;
        ss.y += ss.vy;
        ss.life -= ss.decay;
        ss.trail.push({x:ss.x, y:ss.y});
        if(ss.trail.length>25) ss.trail.shift();
        for(let j=0;j<ss.trail.length;j++) {
          let p = ss.trail[j];
          let prog = j/ss.trail.length;
          ctx.fillStyle = `rgba(255,240,250,${prog*ss.life*0.7})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, prog*2, 0, Math.PI*2);
          ctx.fill();
        }
        if(ss.life<=0 || ss.x>canvas.width+50 || ss.y>canvas.height+50) {
          shootingStars.splice(i,1);
        }
      }
      spawnShootingStar();
      requestAnimationFrame(drawSky);
    }
    drawSky();

    // ──────────────────────────────────────
    // DOM ELEMENTS
    // ──────────────────────────────────────
    const landingOverlay = document.getElementById('landingOverlay');
    const loginOverlay = document.getElementById('loginOverlay');
    const musicPrompt = document.getElementById('musicPrompt');
    const yeganehView = document.getElementById('yeganehView');
    const adminPanel = document.getElementById('adminPanel');
    const starsField = document.getElementById('starsField');
    const counterDisplay = document.getElementById('counterDisplay');
    const starCodeModal = document.getElementById('starCodeModal');
    const starCodeInput = document.getElementById('starCodeInput');
    const starCodeError = document.getElementById('starCodeError');
    const contentModal = document.getElementById('contentModal');
    const contentTitle = document.getElementById('contentTitle');
    const contentBody = document.getElementById('contentBody');
    const finalMessage = document.getElementById('finalMessage');
    const bgMusic = document.getElementById('bgMusic');

    let currentUser = null;
    let pendingStarIndex = null;
    let state = loadState();
    starPositions = getStarPositions();

    // ──────────────────────────────────────
    // NAVIGATION
    // ──────────────────────────────────────
    function goToLogin() {
      landingOverlay.classList.add('hidden');
      loginOverlay.classList.remove('hidden');
      document.getElementById('loginPassword').focus();
    }

    function handleLogin() {
      const pw = document.getElementById('loginPassword').value.trim();
      document.getElementById('loginError').textContent = '';
      if (pw === YEGANEH_PASSWORD) {
        currentUser = 'yeganeh';
        loginOverlay.classList.add('hidden');
        musicPrompt.classList.remove('hidden');
      } else if (pw === ADMIN_PASSWORD) {
        currentUser = 'admin';
        loginOverlay.classList.add('hidden');
        showAdminView();
      } else {
        document.getElementById('loginError').textContent = 'نه یگانه اشتباهه😔🎀';
        document.getElementById('loginPassword').value = '';
      }
    }

    function startMusic(play) {
      musicPrompt.classList.add('hidden');
      if (play) {
        bgMusic.src = DEFAULT_MUSIC_URL;
        bgMusic.volume = 0.25;
        bgMusic.play().catch(()=>{});
      }
      showYeganehView();
    }

    function showYeganehView() {
      state = loadState();
      yeganehView.classList.add('active');
      adminPanel.classList.remove('active');
      renderStars();
      updateCounter();
      checkFinal();
    }

    function showAdminView() {
      yeganehView.classList.remove('active');
      adminPanel.classList.add('active');
      renderAdmin();
    }

    function logout() {
      currentUser = null;
      yeganehView.classList.remove('active');
      adminPanel.classList.remove('active');
      landingOverlay.classList.remove('hidden');
      loginOverlay.classList.add('hidden');
      musicPrompt.classList.add('hidden');
      closeAllModals();
      bgMusic.pause();
    }

    // ──────────────────────────────────────
    // RENDER STARS (YEGANEH VIEW)
    // ──────────────────────────────────────
    function renderStars() {
      starsField.innerHTML = '';
      const opened = new Set(state.opened);
      for (let i=0; i<TOTAL_STARS; i++) {
        const pos = starPositions[i];
        const isOpen = opened.has(i);
        const starEl = document.createElement('div');
        starEl.className = 'star' + (isOpen ? ' opened' : '');
        starEl.style.left = pos.x + '%';
        starEl.style.top = pos.y + '%';
        starEl.innerHTML = `
          <svg viewBox="0 0 100 100">
            <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35"
              fill="${isOpen ? '#fae37c' : '#7e6d99'}"
              stroke="${isOpen ? '#ffeaa7' : '#a390c0'}" stroke-width="2.5"/>
          </svg>
          <span class="star-number">${i+1}</span>
        `;
        if (isOpen) {
          for(let s=0;s<3;s++) {
            let spark = document.createElement('div');
            spark.className = 'sparkle';
            spark.style.top = (20+Math.random()*40)+'%';
            spark.style.left = (20+Math.random()*40)+'%';
            spark.style.animationDelay = s*0.5+'s';
            starEl.appendChild(spark);
          }
        }
        starEl.addEventListener('click', ()=> onStarClick(i, isOpen));
        starsField.appendChild(starEl);
      }
    }

    function updateCounter() {
      counterDisplay.textContent = state.opened.length + ' / ' + TOTAL_STARS + ' stars discovered';
    }

    function onStarClick(index, isOpen) {
      if (isOpen) {
        showContent(index);
      } else {
        pendingStarIndex = index;
        starCodeInput.value = '';
        starCodeError.textContent = '';
        starCodeModal.classList.add('active');
        setTimeout(()=> starCodeInput.focus(), 200);
      }
    }

    function submitStarCode() {
      const code = starCodeInput.value.trim();
      if (!code) { starCodeError.textContent = 'enter a code'; return; }
      const data = state.starData[pendingStarIndex];
      if (data && data.code === code) {
        if (!state.opened.includes(pendingStarIndex)) {
          state.opened.push(pendingStarIndex);
          saveOpened(state.opened);
        }
        starCodeModal.classList.remove('active');
        renderStars();
        updateCounter();
        showContent(pendingStarIndex);
        checkFinal();
      } else {
        starCodeError.textContent = 'نه یگانه اشتباهه😔🎀';
        starCodeInput.value = '';
      }
    }

    function closeStarCodeModal() {
      starCodeModal.classList.remove('active');
      pendingStarIndex = null;
    }

    // ──────────────────────────────────────
    // CONTENT DISPLAY
    // ──────────────────────────────────────
    function showContent(index) {
      const d = state.starData[index];
      contentTitle.textContent = '⭐ star ' + (index+1);
      let html = '';
      if (!d || !d.content) {
        html = '<p style="color:#b0a0c8;">this star is still empty…</p>';
      } else {
        switch(d.type) {
          case 'text': html = `<p style="white-space:pre-wrap; line-height:1.8;">${escapeHtml(d.content)}</p>`; break;
          case 'image': html = `<img src="${escapeHtml(d.content)}" alt="star image" onerror="this.alt='image not found'">`; break;
          case 'audio': html = `<audio controls src="${escapeHtml(d.content)}"></audio>`; break;
          case 'video': html = `<video controls src="${escapeHtml(d.content)}" style="max-width:100%;"></video>`; break;
          case 'spotify': 
            let id = d.content.replace('https://open.spotify.com/playlist/','').split('?')[0];
            html = `<iframe src="https://open.spotify.com/embed/playlist/${id}" width="100%" height="200" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>`;
            break;
          case 'link': html = `<a href="${escapeHtml(d.content)}" target="_blank" style="color:#fae37c;">open link ↗</a>`; break;
          default: html = `<p>${escapeHtml(d.content)}</p>`;
        }
      }
      contentBody.innerHTML = html;
      contentModal.classList.add('active');
    }

    function closeContentModal() {
      contentModal.classList.remove('active');
    }

    function closeAllModals() {
      starCodeModal.classList.remove('active');
      contentModal.classList.remove('active');
    }

    // ──────────────────────────────────────
    // ADMIN PANEL
    // ──────────────────────────────────────
    function renderAdmin() {
      const grid = document.getElementById('adminGrid');
      grid.innerHTML = '';
      state.starData.forEach((d,i)=>{
        const card = document.createElement('div');
        card.className = 'admin-card';
        card.innerHTML = `
          <h4>⭐ star ${i+1} ${state.opened.includes(i) ? '(unlocked)' : ''}</h4>
          <label>code</label>
          <input type="text" value="${escapeHtml(d.code)}" data-idx="${i}" data-field="code">
          <label>type</label>
          <select data-idx="${i}" data-field="type">
            <option value="text" ${d.type==='text'?'selected':''}>text</option>
            <option value="image" ${d.type==='image'?'selected':''}>image</option>
            <option value="audio" ${d.type==='audio'?'selected':''}>audio</option>
            <option value="video" ${d.type==='video'?'selected':''}>video</option>
            <option value="spotify" ${d.type==='spotify'?'selected':''}>spotify playlist</option>
            <option value="link" ${d.type==='link'?'selected':''}>link</option>
          </select>
          <label>content</label>
          <textarea rows="2" data-idx="${i}" data-field="content">${escapeHtml(d.content||'')}</textarea>
        `;
        grid.appendChild(card);
      });
      // attach listeners
      document.querySelectorAll('#adminGrid input, #adminGrid select, #adminGrid textarea').forEach(el=>{
        el.addEventListener('change', (e)=>{
          const idx = parseInt(e.target.dataset.idx);
          const field = e.target.dataset.field;
          state.starData[idx][field] = e.target.value;
          saveStarData(state.starData);
        });
      });
    }

    // ──────────────────────────────────────
    // FINAL MESSAGE
    // ──────────────────────────────────────
    function checkFinal() {
      if (state.opened.length === TOTAL_STARS && !state.finalShown) {
        localStorage.setItem('finalMessageShown', 'true');
        finalMessage.classList.add('active');
        setTimeout(()=> finalMessage.classList.remove('active'), 8000);
      }
    }

    // ──────────────────────────────────────
    // HELPERS
    // ──────────────────────────────────────
    function escapeHtml(text) {
      if (!text) return '';
      return String(text).replace(/[&<>"']/g, function(m) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
      });
    }

    // Close modals on backdrop click
    window.addEventListener('click', (e)=>{
      if (e.target === starCodeModal) closeStarCodeModal();
      if (e.target === contentModal) closeContentModal();
    });
    document.addEventListener('keydown', (e)=>{
      if (e.key === 'Escape') closeAllModals();
    });

    // Enter key for login
    document.getElementById('loginPassword').addEventListener('keydown', (e)=>{
      if (e.key==='Enter') handleLogin();
    });
    starCodeInput.addEventListener('keydown', (e)=>{
      if (e.key==='Enter') submitStarCode();
    });

    // Set initial 5 stars with user's data (if not already set)
    (function presetData() {
      let data = loadState().starData;
      const presets = [
        { code:'2217', type:'link', content:'https://DigiPostal.ir/xvjh8f5' },
        { code:'4580', type:'spotify', content:'https://open.spotify.com/playlist/7InF5yCRlJ1vs6cIM4PcRB?si=ZWWaOzNxS46-_58OJ5Y1Hw' },
        { code:'3389', type:'image', content:'https://s6.uupload.ir/files/۲۰۲۶۰۶۲۶_۰۳۰۲۵۶_gqfy.jpg' },
        { code:'6708', type:'image', content:'https://uploadkon.ir/uploads/f56624_26Screenshot-۲۰۲۶۰۶۲۴-۰۴۱۹۵۳-Samsung-Notes.jpg' },
        { code:'5467', type:'audio', content:'https://uupload.ir/view/telegraph_classic_world_is_better_with_you_yeganeh-3_hs.wav/' }
      ];
      let changed = false;
      for(let i=0; i<presets.length && i<TOTAL_STARS; i++) {
        if (!data[i].code && !data[i].content) {
          data[i] = presets[i];
          changed = true;
        }
      }
      if (changed) saveStarData(data);
    })();

    // Load initial state: show landing
    landingOverlay.classList.remove('hidden');
  </script>
</body>
</html>
