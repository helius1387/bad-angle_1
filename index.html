<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>آسمون ستاره‌های یگانه</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: 'Tahoma', 'Vazirmatn', sans-serif;
      position: relative;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ========== لایهٔ ورود ========== */
    .login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0c14;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      color: white;
      font-family: inherit;
    }

    .login-overlay h1 {
      font-size: 2rem;
      color: #ffd700;
      text-shadow: 0 0 20px gold;
    }

    .login-box {
      background: rgba(20,20,40,0.8);
      border-radius: 20px;
      padding: 2rem;
      display: flex;
      gap: 0.5rem;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .login-box input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 1.2rem;
      text-align: center;
      font-family: inherit;
    }

    .login-box button {
      background: #ffd700;
      border: none;
      border-radius: 30px;
      padding: 0.5rem 2rem;
      font-size: 1rem;
      cursor: pointer;
      color: #1a1a2e;
      font-weight: bold;
      font-family: inherit;
    }

    .login-error {
      color: #ff7b7b;
      min-height: 1.5rem;
    }

    /* ========== رابط اصلی (بعد از ورود) ========== */
    .ui-container {
      position: absolute;
      z-index: 10;
      top: 5%;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      pointer-events: none;
    }

    .welcome {
      color: #f0e6d2;
      font-size: 1.8rem;
      text-shadow: 0 0 20px #ffd700;
      min-height: 3rem;
      text-align: center;
      padding: 0 1rem;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .welcome.show {
      opacity: 1;
    }

    .password-box {
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 0.5rem 0.5rem 0.5rem 1.2rem;
      display: flex;
      gap: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
    }

    #passwordInput {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 1.1rem;
      width: 180px;
      text-align: right;
      font-family: inherit;
    }

    #passwordInput::placeholder {
      color: #a0a0b0;
    }

    #submitPassword {
      background: #ffd700;
      border: none;
      border-radius: 50px;
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      color: #1a1a2e;
      font-weight: bold;
      transition: all 0.3s;
      font-family: inherit;
    }

    #submitPassword:hover {
      background: #ffea70;
      box-shadow: 0 0 20px #ffd700;
    }

    .error-msg {
      color: #ff7b7b;
      font-size: 0.9rem;
      text-shadow: 0 0 10px red;
      opacity: 0;
      transition: opacity 0.5s;
    }

    /* ========== مودال محتوا ========== */
    .modal {
      position: fixed;
      z-index: 100;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: rgba(30, 30, 50, 0.95);
      border: 1px solid #ffd700;
      border-radius: 20px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      color: #f0e6d2;
      position: relative;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
      text-align: center;
    }

    .close-modal {
      position: absolute;
      top: 10px;
      left: 15px;
      font-size: 1.8rem;
      color: #ffd700;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
    }

    /* ========== پیغام جادویی آخر ========== */
    .magic-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s;
      flex-direction: column;
      gap: 2rem;
    }

    .magic-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .magic-text {
      font-size: 3rem;
      color: #ffd700;
      text-shadow: 0 0 30px gold, 0 0 60px gold;
      animation: floatMagic 2s ease-in-out infinite alternate;
      text-align: center;
      padding: 1rem;
    }

    @keyframes floatMagic {
      0% { transform: translateY(0); }
      100% { transform: translateY(-15px); }
    }
  </style>
</head>
<body>

  <!-- ========== صفحهٔ ورود ========== -->
  <div class="login-overlay" id="loginOverlay">
    <h1>✨ به آسمون ستاره‌ها خوش اومدی ✨</h1>
    <div class="login-box">
      <input type="password" id="mainPassword" placeholder="رمز ورود" autocomplete="off">
      <button id="enterButton">ورود</button>
    </div>
    <div class="login-error" id="loginError"></div>
  </div>

  <!-- ========== آسمون اصلی (در ابتدا مخفی) ========== -->
  <canvas id="starsCanvas" style="display: none;"></canvas>

  <div class="ui-container" id="uiContainer" style="display: none;">
    <div class="welcome" id="welcomeMessage"></div>
    <div class="password-box" id="starPasswordBox">
      <input type="text" id="passwordInput" placeholder="رمز ستاره" autocomplete="off">
      <button id="submitPassword">✨ باز کن ✨</button>
    </div>
    <div class="error-msg" id="errorMessage">نه یگانه اشتباهه😔🎀</div>
  </div>

  <!-- مودال -->
  <div class="modal" id="contentModal">
    <div class="modal-content">
      <button class="close-modal" id="closeModal">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- پیغام جادویی -->
  <div class="magic-overlay" id="magicOverlay">
    <div class="magic-text">World is better with you yeganeh:)♡</div>
    <button style="background:transparent; border:1px solid gold; color:gold; padding:0.5rem 2rem; border-radius:30px; cursor:pointer; font-size:1rem;" onclick="document.getElementById('magicOverlay').classList.remove('active')">✨ فهمیدم ✨</button>
  </div>

  <script>
    // ========== داده‌های ستاره‌ها ==========
    const starsData = [
      { id: 1, password: "2217", content: `<h2>🌟 ستاره اول</h2><p>یه سورپرایز قشنگ واست دارم...</p><a href="https://DigiPostal.ir/xvjh8f5" target="_blank">باز کردن لینک</a>` },
      { id: 2, password: "4580", content: `<h2>🎵 ستاره دوم</h2><p>پلی‌لیستی که فقط برای تو ساختم:</p><iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/7InF5yCRlJ1vs6cIM4PcRB?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>` },
      { id: 3, password: "3389", content: `<h2>🖼️ ستاره سوم</h2><p>یه عکس که حرفای زیادی داره...</p><img src="https://s6.uupload.ir/files/۲۰۲۶۰۶۲۶_۰۳۰۲۵۶_gqfy.jpg" style="max-width:100%; border-radius:12px;" alt="عکس">` },
      { id: 4, password: "6708", content: `<h2>📝 ستاره چهارم</h2><p>بخون و لبخند بزن...</p><img src="https://uploadkon.ir/uploads/f56624_26Screenshot-۲۰۲۶۰۶۲۴-۰۴۱۹۵۳-Samsung-Notes.jpg" style="max-width:100%; border-radius:12px;" alt="یادداشت">` },
      { id: 5, password: "5467", content: `<h2>🎧 ستاره پنجم</h2><p>یه قطعه‌ی صوتی برای گوش‌های تو:</p><audio controls style="width:100%;"><source src="https://uupload.ir/view/telegraph_classic_world_is_better_with_you_yeganeh-3_hs.wav" type="audio/wav"></audio>` }
    ];

    // پر کردن ستاره‌های ۶ تا ۲۱ با محتوای پیش‌فرض (بعداً می‌تونی عوض کنی)
    for (let i = starsData.length + 1; i <= 21; i++) {
      starsData.push({
        id: i,
        password: "رمز" + i,  // بعداً می‌تونی تغییر بدی
        content: `<h2>🌟 ستاره ${i}</h2><p>یگانه جون، این ستاره هنوز رازش رو کامل برات ننوشتم...<br>به‌زودی سورپرایز قشنگتری میاد 🎀</p>`
      });
    }

    // ========== متغیرهای سراسری ==========
    let userMode = null;         // 'yeganeh' یا 'admin'
    let openedStars = {};        // ستاره‌های باز شده (کلید = شماره)
    const canvas = document.getElementById('starsCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    const starPositions = [];
    let shootingStars = [];

    // ========== ورود اصلی ==========
    const loginOverlay = document.getElementById('loginOverlay');
    const mainPassword = document.getElementById('mainPassword');
    const enterButton = document.getElementById('enterButton');
    const loginError = document.getElementById('loginError');

    function handleMainLogin() {
      const pass = mainPassword.value.trim();
      if (pass === "Heliganeh") {
        userMode = 'yeganeh';
        // بارگیری پیشرفت یگانه
        const saved = localStorage.getItem('yeganeh_openedStars');
        openedStars = saved ? JSON.parse(saved) : {};
        startSite();
      } else if (pass === "221B") {
        userMode = 'admin';
        // همه ستاره‌ها باز
        openedStars = {};
        for (let i = 1; i <= 21; i++) openedStars[i] = true;
        startSite();
      } else {
        loginError.textContent = "رمز اشتباهه، دوباره تلاش کن";
        mainPassword.value = '';
      }
    }

    enterButton.addEventListener('click', handleMainLogin);
    mainPassword.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleMainLogin();
    });

    function startSite() {
      loginOverlay.style.display = 'none';
      canvas.style.display = 'block';
      document.getElementById('uiContainer').style.display = 'flex';

      // اگر حالت مدیر باشه، باکس رمز ستاره رو مخفی کن
      if (userMode === 'admin') {
        document.getElementById('starPasswordBox').style.display = 'none';
        document.getElementById('welcomeMessage').textContent = '✨ حالت مدیریت - همه ستاره‌ها برای تو روشن شدن ✨';
        document.getElementById('welcomeMessage').classList.add('show');
      }

      resizeCanvas();
      generateStarPositions();
      animate();

      // خوشامدگویی اولیه برای یگانه
      if (userMode === 'yeganeh') {
        const openedCount = Object.keys(openedStars).length;
        if (openedCount === 21) {
          document.getElementById('welcomeMessage').textContent = `یگانه عزیزم، همه ستاره‌ها برای تو روشن شدن! آسمون مال توئه 🎇`;
          document.getElementById('welcomeMessage').classList.add('show');
          checkAllOpened();
        } else if (openedCount > 0) {
          document.getElementById('welcomeMessage').textContent = `${openedCount} ستاره‌ات روشنه، منتظر رمزهای بعدی باش 🌙`;
          document.getElementById('welcomeMessage').classList.add('show');
          setTimeout(() => document.getElementById('welcomeMessage').classList.remove('show'), 4000);
        }
      }
    }

    // ========== Canvas و انیمیشن ==========
    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    window.addEventListener('resize', () => {
      resizeCanvas();
      if (starPositions.length === 0) generateStarPositions();
    });

    function generateStarPositions() {
      starPositions.length = 0;
      const margin = 60;
      const minDistance = width < 600 ? 55 : 90;
      for (let i = 0; i < 21; i++) {
        let x, y, overlapping;
        let attempts = 0;
        do {
          x = Math.random() * (width - 2 * margin) + margin;
          y = Math.random() * (height * 0.85) + margin * 2;
          overlapping = false;
          for (let pos of starPositions) {
            const dx = pos.x - x;
            const dy = pos.y - y;
            if (Math.sqrt(dx * dx + dy * dy) < minDistance) {
              overlapping = true;
              break;
            }
          }
          attempts++;
          if (attempts > 1000) break;
        } while (overlapping);
        starPositions.push({ x, y, id: i + 1 });
      }
    }

    // شهاب
    function createShootingStar() {
      const startX = Math.random() * width;
      const startY = Math.random() * height * 0.5;
      const length = 80 + Math.random() * 100;
      const speed = 6 + Math.random() * 6;
      const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
      shootingStars.push({
        x: startX, y: startY,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        length, life: 1.0,
        decay: 0.015 + Math.random() * 0.02
      });
    }

    setInterval(() => {
      if (Math.random() < 0.4) createShootingStar();
    }, 3000);

    function drawShootingStar(s) {
      const tailX = s.x - s.vx * 5;
      const tailY = s.y - s.vy * 5;
      const gradient = ctx.createLinearGradient(s.x, s.y, tailX, tailY);
      gradient.addColorStop(0, 'rgba(255,255,255,1)');
      gradient.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(tailX, tailY);
      ctx.strokeStyle = gradient;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function updateShootingStars() {
      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const s = shootingStars[i];
        s.x += s.vx;
        s.y += s.vy;
        s.life -= s.decay;
        if (s.life <= 0 || s.x > width + 100 || s.y > height + 100) {
          shootingStars.splice(i, 1);
        }
      }
    }

    function drawStarShape(cx, cy, outerR, innerR, points, rotation = 0) {
      ctx.beginPath();
      for (let i = 0; i < points * 2; i++) {
        const radius = i % 2 === 0 ? outerR : innerR;
        const angle = (i * Math.PI) / points - Math.PI / 2 + rotation;
        const x = cx + radius * Math.cos(angle);
        const y = cy + radius * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
    }

    function drawScene() {
      ctx.clearRect(0, 0, width, height);

      // ستاره‌های ریز چشمک‌زن
      for (let i = 0; i < 200; i++) {
        const sx = (i * 37 + 13) % width;
        const sy = (i * 83 + 7) % height;
        const brightness = 0.5 + 0.5 * Math.sin(Date.now() * 0.002 + i);
        ctx.fillStyle = `rgba(255,255,255,${0.3 + brightness * 0.4})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 1 + brightness * 1.2, 0, Math.PI * 2);
        ctx.fill();
      }

      // شهاب‌ها
      updateShootingStars();
      shootingStars.forEach(s => drawShootingStar(s));

      // ستاره‌های ۲۱گانه
      const time = Date.now() * 0.003;
      starPositions.forEach(pos => {
        const isOpened = openedStars[pos.id];
        const baseGlow = isOpened ? 20 : 5;
        const pulse = Math.sin(time + pos.id) * 5;
        const glowSize = baseGlow + pulse;
        const glowColor = isOpened ? `rgba(255,215,0,${0.6 + pulse * 0.03})` : 'rgba(100,100,150,0.3)';

        ctx.shadowColor = glowColor;
        ctx.shadowBlur = glowSize;

        drawStarShape(pos.x, pos.y, 22, 10, 5, Math.PI / 10);
        ctx.fillStyle = isOpened ? '#ffd700' : '#4a4a6a';
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = isOpened ? '#1a1a2e' : '#ccccdd';
        ctx.font = 'bold 14px Tahoma';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(pos.id, pos.x, pos.y + 1);

        if (!isOpened) {
          ctx.fillStyle = 'rgba(0,0,0,0.3)';
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, 25, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function animate() {
      drawScene();
      requestAnimationFrame(animate);
    }

    // ========== کلیک روی ستاره‌ها ==========
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      for (let pos of starPositions) {
        const dx = mouseX - pos.x;
        const dy = mouseY - pos.y;
        if (Math.sqrt(dx * dx + dy * dy) < 30) {
          if (openedStars[pos.id]) {
            showStarContent(pos.id);
          } else {
            shakeStar(pos);
          }
          break;
        }
      }
    });

    function shakeStar(pos) {
      const originalX = pos.x;
      let count = 0;
      const interval = setInterval(() => {
        pos.x = originalX + (Math.random() - 0.5) * 10;
        count++;
        if (count > 10) {
          clearInterval(interval);
          pos.x = originalX;
        }
      }, 30);
    }

    // ========== باکس رمز روزانه ==========
    const passwordInput = document.getElementById('passwordInput');
    const submitBtn = document.getElementById('submitPassword');
    const welcomeDiv = document.getElementById('welcomeMessage');
    const errorDiv = document.getElementById('errorMessage');

    function showWelcome(starId) {
      welcomeDiv.textContent = `آفرین یگانه جان! ستاره ${starId} روشن شد ✨`;
      welcomeDiv.classList.add('show');
      setTimeout(() => welcomeDiv.classList.remove('show'), 4000);
    }

    function showError() {
      errorDiv.style.opacity = '1';
      setTimeout(() => errorDiv.style.opacity = '0', 3000);
    }

    function checkAllOpened() {
      if (userMode === 'yeganeh' && Object.keys(openedStars).length === 21) {
        document.getElementById('magicOverlay').classList.add('active');
      }
    }

    function submitDailyPassword() {
      const entered = passwordInput.value.trim();
      if (!entered) return;

      const star = starsData.find(s => s.password === entered && !openedStars[s.id]);
      if (star) {
        openedStars[star.id] = true;
        localStorage.setItem('yeganeh_openedStars', JSON.stringify(openedStars));
        passwordInput.value = '';
        showWelcome(star.id);
        checkAllOpened();
        setTimeout(() => showStarContent(star.id), 1500);
      } else {
        const alreadyOpened = starsData.find(s => s.password === entered && openedStars[s.id]);
        if (alreadyOpened) {
          showStarContent(alreadyOpened.id);
          passwordInput.value = '';
        } else {
          showError();
          passwordInput.value = '';
        }
      }
    }

    if (userMode === 'yeganeh') {
      submitBtn.addEventListener('click', submitDailyPassword);
      passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') submitDailyPassword();
      });
    }

    // ========== مودال ==========
    const modal = document.getElementById('contentModal');
    const modalBody = document.getElementById('modalBody');
    const closeModal = document.getElementById('closeModal');

    function showStarContent(starId) {
      const star = starsData.find(s => s.id === starId);
      if (!star) return;
      modalBody.innerHTML = star.content;
      modal.classList.add('active');
    }

    closeModal.addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('active');
    });
  </script>
</body>
</html>
